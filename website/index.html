<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTFD - Elite Gaming Community</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">TTFD</div>
            <nav class="nav">
                <a href="#home" class="nav-link active">Главная</a>
                <a href="#leaderboard" class="nav-link">Топ игроков</a>
                <a href="#roulette" class="nav-link">Рулетка</a>
            </nav>
            <button class="login-btn" id="loginBtn">Войти через Discord</button>
        </header>

        <main class="main">
            <section id="home" class="section active">
                <div class="hero">
                    <h1 class="hero-title">Добро пожаловать в TTFD</h1>
                    <p class="hero-subtitle">Elite Gaming Community</p>
                </div>
            </section>

            <section id="leaderboard" class="section">
                <h2 class="section-title">TOP-3 Игроков по XP</h2>
                <div class="leaderboard">
                    <div class="loading">Загрузка...</div>
                </div>
            </section>

            <section id="roulette" class="section">
                <h2 class="section-title">Рулетка</h2>
                <div class="roulette-container">
                    <p class="info-text">Войдите через Discord для доступа к рулетке</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTFD Gaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1729 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid #2a3f5f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #00d4ff;
            color: #0a0e27;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .login-btn {
            padding: 10px 25px;
            background: linear-gradient(45deg, #7b2ff7, #f107a3);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(123, 47, 247, 0.5);
        }

        /* Profile Section */
        .profile-card {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1729 100%);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #2a3f5f;
            margin-bottom: 30px;
        }

        .profile-header {
            display: flex;
            gap: 25px;
            align-items: center;
            margin-bottom: 25px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .profile-info h2 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .profile-tag {
            color: #7b2ff7;
            font-size: 14px;
        }

        .xp-bar {
            background: rgba(0, 0, 0, 0.3);
            height: 25px;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 15px;
            border: 1px solid #2a3f5f;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1729 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a3f5f;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-box:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            transform: translateY(-3px);
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Leaderboard */
        .leaderboard {
            display: grid;
            gap: 15px;
        }

        .player-item {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1729 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a3f5f;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
        }

        .player-item:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .player-rank {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
            min-width: 40px;
        }

        .player-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #00d4ff;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-xp {
            color: #7b2ff7;
            font-size: 14px;
        }

        /* Roulette */
        .roulette-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .roulette-wheel {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            background: linear-gradient(45deg, #00d4ff, #7b2ff7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: bold;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
            transition: transform 0.5s;
        }

        .roulette-wheel.spin {
            animation: spin 2s ease-out;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(1080deg); }
        }

        .bet-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bet-input {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .bet-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .bet-btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bet-btn.red {
            background: #ff4757;
        }

        .bet-btn.green {
            background: #2ed573;
        }

        .bet-btn.black {
            background: #2f3542;
        }

        .bet-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .result.win {
            background: rgba(46, 213, 115, 0.2);
            border: 1px solid #2ed573;
            color: #2ed573;
        }

        .result.lose {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid #ff4757;
            color: #ff4757;
        }

        /* Section */
        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-message {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .nav {
                display: none;
            }
            
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">TTFD</div>
            <div class="nav">
                <button class="nav-btn active" onclick="showSection('profile')">Профиль</button>
                <button class="nav-btn" onclick="showSection('leaderboard')">Лидеры</button>
                <button class="nav-btn" onclick="showSection('roulette')">Рулетка</button>
            </div>
            <button class="login-btn" id="loginBtn" onclick="login()">Войти</button>
        </div>

        <!-- Profile Section -->
        <div id="profile" class="section active">
            <div class="profile-card">
                <div class="profile-header">
                    <img id="avatar" class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar">
                    <div class="profile-info">
                        <h2 id="username">Гость</h2>
                        <div class="profile-tag" id="tag">Войдите для просмотра профиля</div>
                        <div class="xp-bar">
                            <div class="xp-fill" id="xpBar" style="width: 0%">
                                <span id="xpText">0 / 100 XP</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="coins">0</div>
                    <div class="stat-label">Монеты</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="xp">0</div>
                    <div class="stat-label">Опыт</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="level">1</div>
                    <div class="stat-label">Уровень</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="rank">F</div>
                    <div class="stat-label">Ранг</div>
                </div>
            </div>
        </div>

        <!-- Leaderboard Section -->
        <div id="leaderboard" class="section">
            <h2 class="section-title">Топ игроков</h2>
            <div class="leaderboard" id="leaderboardList">
                <div class="auth-message">Загрузка...</div>
            </div>
        </div>

        <!-- Roulette Section -->
        <div id="roulette" class="section">
            <h2 class="section-title">Рулетка</h2>
            <div class="roulette-container">
                <div id="rouletteAuth" class="auth-message">
                    Войдите через Discord для доступа к рулетке
                </div>
                <div id="rouletteGame" style="display: none;">
                    <div class="roulette-wheel" id="wheel">?</div>
                    <div class="bet-controls">
                        <input type="number" id="betAmount" class="bet-input" placeholder="Ставка" min="10" value="100">
                        <div class="bet-buttons">
                            <button class="bet-btn red" onclick="placeBet('red')">Красное x2</button>
                            <button class="bet-btn green" onclick="placeBet('green')">Зелёное x14</button>
                            <button class="bet-btn black" onclick="placeBet('black')">Чёрное x2</button>
                        </div>
                    </div>
                    <div id="result" class="result" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
